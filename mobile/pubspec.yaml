name: synchronization
description: Synchronized local media playback across phones.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC
  flutter_webrtc: ^0.12.1

  # State Management
  provider: ^6.1.2

  # Socket.io signaling
  socket_io_client: ^3.1.2

  # QR code scanner
  mobile_scanner: ^5.2.3

  # Deep link handling
  app_links: ^6.4.1

  # Local media playback
  audio_session: ^0.1.25
  just_audio: ^0.9.40
  video_player: ^2.8.6
  file_picker: ^8.0.0+1
  qr_flutter: ^4.1.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  network_info_plus: ^5.0.0
  path_provider: ^2.1.0

  # Wakelock (keep screen on while streaming)
  wakelock_plus: ^1.5.2

  # URL launcher
  url_launcher: ^6.3.1

  # Shared preferences (remember last server URL)
  shared_preferences: ^2.3.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.jpg"
  adaptive_icon_background: "#030303"
  adaptive_icon_foreground: "assets/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
