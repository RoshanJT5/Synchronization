<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Syncronization...</title>
    <style>
      body { background: #030303; color: #f8fafc; font-family: system-ui, sans-serif;
             display: flex; flex-direction: column; align-items: center; justify-content: center;
             min-height: 100vh; margin: 0; gap: 16px; }
      .spinner { width: 40px; height: 40px; border: 3px solid rgba(168,85,247,0.2);
                 border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      p { color: #94a3b8; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <p>Opening Syncronization…</p>
    <script>
      // Redirect to the main page, preserving all query params (?id=...&server=...)
      const params = window.location.search;
      window.location.replace('/' + params + window.location.hash);
    </script>
  </body>
</html>
