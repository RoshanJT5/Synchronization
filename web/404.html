<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Synchronization Redirect</title>
    <script type="text/javascript">
      // GitHub Pages 404 hack to allow subfolder routing
      // This will take any path like /connect and redirect it to index.html with the right params
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Redirect to the root index.html
      // We assume the user is deploying the web contents to the root of the domain
      window.location.replace('/' + search + hash);
    </script>
  </head>
  <body>
  </body>
</html>
